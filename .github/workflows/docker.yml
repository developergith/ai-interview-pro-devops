name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------- BACKEND --------
      - name: Build Backend Image
        run: |
          docker build -t ayusnath/ai-backend:latest ./ai-interview-Backend

      - name: Push Backend Image
        run: docker push ayusnath/ai-backend:latest

      # -------- FRONTEND --------
      - name: Build Frontend Image
        run: |
          docker build -t ayusnath/ai-frontend:latest ./ai-interview-Frontend

      - name: Push Frontend Image
        run: docker push ayusnath/ai-frontend:latest
