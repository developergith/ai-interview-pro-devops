name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t ayusnath/ai-backend:latest ./ai-interview-Backend

      - name: Push Backend Image
        run: docker push ayusnath/ai-backend:latest

      - name: Build Frontend Image
        run: docker build -t ayusnath/ai-frontend:latest ./ai-interview-Frontend

      - name: Push Frontend Image
        run: docker push ayusnath/ai-frontend:latest